<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WAVR</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ROOT VARIABLES
═══════════════════════════════════════════ */
:root {
  --bg:        #0a0a0a;
  --bg2:       #111111;
  --bg3:       #181818;
  --bg4:       #242424;
  --hover:     #2a2a2a;
  --border:    rgba(255,255,255,0.07);
  --accent:    #1db954;
  --accent-d:  #158a3e;
  --accent-glow: rgba(29,185,84,0.25);
  --text:      #ffffff;
  --text-2:    #b3b3b3;
  --text-3:    #6a6a6a;
  --sidebar-w: 260px;
  --player-h:  90px;
  --radius:    8px;
  --font: 'Plus Jakarta Sans', sans-serif;
}

/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
button { font-family: var(--font); cursor:pointer; border:none; background:none; }
input  { font-family: var(--font); }

/* ═══════════════════════════════════════════
   LAYOUT — DESKTOP
═══════════════════════════════════════════ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: 1fr var(--player-h);
  height: 100vh;
  gap: 0;
}

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
.sidebar {
  background: var(--bg);
  grid-row: 1/2;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}

.sidebar-inner {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  padding: 0 8px;
}

.logo-wrap {
  padding: 20px 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.logo-svg { color: var(--accent); }
.logo-text {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
}

.nav-section { flex-shrink:0; padding: 0 4px 8px; }
.nav-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius);
  color: var(--text-2);
  font-size: 13px;
  font-weight: 600;
  transition: color 0.15s, background 0.15s;
  text-decoration: none;
}
.nav-btn:hover { color: var(--text); background: var(--hover); }
.nav-btn.active { color: var(--text); }

.library-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px 6px;
  flex-shrink: 0;
}
.library-label {
  display: flex; align-items:center; gap:8px;
  font-size: 13px; font-weight: 700; color: var(--text-2);
}
.library-label:hover { color: var(--text); cursor:pointer; }

.track-count-badge {
  font-size: 11px;
  color: var(--text-3);
  background: var(--bg3);
  padding: 2px 7px;
  border-radius: 10px;
}

.status-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 12px 8px;
  font-size: 11px; color: var(--text-3);
  flex-shrink: 0;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-3); flex-shrink:0;
  transition: background 0.3s;
}
.status-dot.ok  { background: var(--accent); }
.status-dot.err { background: #e74c3c; }
.status-dot.loading { background: #f1c40f; animation: blink 0.9s ease-in-out infinite alternate; }
@keyframes blink { from{opacity:0.3} to{opacity:1} }

/* Playlist */
.playlist-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0 0 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--bg4) transparent;
}
.playlist-scroll::-webkit-scrollbar { width: 4px; }
.playlist-scroll::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

.track-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
}
.track-row:hover { background: var(--hover); }
.track-row.active { background: var(--bg4); }

.tr-num-wrap {
  width: 20px;
  text-align: center;
  flex-shrink: 0;
  position: relative;
}
.tr-num { font-size: 13px; color: var(--text-3); }
.tr-num-wrap .play-hover {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  color: var(--text);
}
.track-row:hover .tr-num { visibility: hidden; }
.track-row:hover .play-hover { display: flex; }
.track-row.active .tr-num { display: none; }
.track-row.active .play-hover { display: flex; color: var(--accent); }

/* Mini animated bars */
.mini-bars {
  display: none;
  align-items: flex-end;
  gap: 2px;
  height: 12px;
}
.track-row.active .mini-bars { display: flex; }
.track-row.active .tr-num-wrap .play-hover { display: none; }
.track-row.active:not(.paused-state) .mini-bars { display: flex; }
.track-row.active .mini-bars .mb {
  width: 2px; background: var(--accent); border-radius: 1px;
  animation: mb-anim 0.7s ease-in-out infinite alternate;
}
.mb:nth-child(1){height:4px;animation-delay:0s;}
.mb:nth-child(2){height:10px;animation-delay:.12s;}
.mb:nth-child(3){height:6px;animation-delay:.25s;}
.mb:nth-child(4){height:12px;animation-delay:.08s;}
.track-row.paused-state .mini-bars .mb { animation-play-state: paused; }
@keyframes mb-anim { from{transform:scaleY(0.3)} to{transform:scaleY(1)} }

.tr-thumb {
  width: 38px; height: 38px;
  border-radius: 4px;
  background: var(--bg4);
  flex-shrink: 0;
  display: flex; align-items:center; justify-content:center;
  font-size: 16px;
  overflow: hidden;
}
.tr-info { flex:1; min-width:0; }
.tr-title {
  font-size: 13px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
.track-row.active .tr-title { color: var(--accent); }
.tr-artist {
  font-size: 11px; color: var(--text-3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}
.tr-del {
  opacity: 0;
  color: var(--text-3);
  padding: 4px; border-radius: 4px;
  flex-shrink: 0; display:flex; align-items:center;
  transition: all 0.15s;
}
.track-row:hover .tr-del { opacity: 1; }
.tr-del:hover { color: #e74c3c; }

.empty-wrap {
  padding: 32px 16px;
  text-align: center;
  color: var(--text-3);
}
.empty-wrap .e-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
.empty-wrap h4 { font-size: 13px; font-weight: 700; color: var(--text-2); margin-bottom: 4px; }
.empty-wrap p  { font-size: 11px; line-height: 1.6; }

.add-track-btn {
  margin: 6px 8px 10px;
  padding: 9px 12px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  color: var(--text-3);
  font-size: 12px; font-weight: 600;
  display: flex; align-items:center; gap:7px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.add-track-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(29,185,84,0.05); }

/* ═══════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════ */
.main-content {
  grid-row: 1/2;
  background: var(--bg2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.main-bg {
  position: absolute; inset: 0;
  pointer-events: none;
  transition: background 1.5s ease;
  z-index: 0;
}
.main-bg::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 40%, var(--bg2) 100%);
}

.main-topbar {
  position: relative; z-index: 2;
  padding: 20px 28px 0;
  display: flex; align-items:center; justify-content:space-between;
}
.main-topbar-title {
  font-size: 12px; font-weight: 600;
  color: var(--text-3); letter-spacing: 1.5px; text-transform:uppercase;
}
.refresh-btn {
  width: 32px; height: 32px;
  background: var(--bg3);
  border-radius: 50%;
  display: flex; align-items:center; justify-content:center;
  color: var(--text-2);
  transition: all 0.15s;
}
.refresh-btn:hover { background: var(--hover); color: var(--text); transform: rotate(180deg); transition: transform 0.4s, background 0.15s, color 0.15s; }

.now-playing-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 40px;
  position: relative; z-index: 2;
  gap: 0;
}

/* Album Art */
.art-container {
  position: relative;
  margin-bottom: 32px;
}
.art-shadow-ring {
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.6s;
  filter: blur(24px);
  pointer-events: none;
}
.art-container.lit .art-shadow-ring { opacity: 0.5; }
.art-box {
  width: 220px; height: 220px;
  border-radius: 50%;
  background: var(--bg3);
  display: flex; align-items:center; justify-content:center;
  font-size: 80px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 3px rgba(255,255,255,0.04);
  overflow: hidden;
  transition: box-shadow 0.5s;
  position: relative;
}
.art-box.spinning { animation: spin 18s linear infinite; }
.art-box.spinning.halted { animation-play-state: paused; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.art-center-hole {
  position: absolute;
  width: 32px; height: 32px;
  background: var(--bg2);
  border-radius: 50%;
  border: 3px solid var(--bg3);
  z-index: 2;
  top:50%; left:50%; transform:translate(-50%,-50%);
}

/* Track info */
.nw-info {
  text-align: center;
  margin-bottom: 24px;
  width: 100%;
  max-width: 420px;
}
.nw-title {
  font-size: 26px; font-weight: 800;
  letter-spacing: -0.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 6px;
}
.nw-artist {
  font-size: 14px; color: var(--text-2); font-weight: 500;
}

/* Visualizer */
.viz-wrap {
  display: flex; align-items: flex-end; gap: 2px;
  height: 44px; width: 320px; max-width: 90%;
  justify-content: center;
  margin-bottom: 20px;
  opacity: 0.55;
}
.vb { width: 3px; border-radius: 2px; background: var(--accent); min-height: 3px; }

/* ═══════════════════════════════════════════
   PLAYER BAR (BOTTOM)
═══════════════════════════════════════════ */
.player-bar {
  grid-column: 1/-1;
  grid-row: 2/3;
  background: var(--bg3);
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr var(--sidebar-w);
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 10;
}

/* Left: current track info */
.pb-track {
  display: flex; align-items:center; gap:12px; min-width: 0;
}
.pb-thumb {
  width: 48px; height: 48px;
  border-radius: 4px;
  background: var(--bg4);
  flex-shrink: 0;
  display: flex; align-items:center; justify-content:center;
  font-size: 20px;
  overflow: hidden;
}
.pb-info { min-width: 0; }
.pb-title {
  font-size: 13px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pb-artist {
  font-size: 11px; color: var(--text-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 2px;
}

/* Center: controls */
.pb-center {
  display: flex; flex-direction:column; align-items:center; gap:8px;
}
.pb-ctrl-row {
  display: flex; align-items:center; gap:6px;
}
.ctrl-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items:center; justify-content:center;
  color: var(--text-2);
  transition: color 0.15s, transform 0.1s;
}
.ctrl-icon:hover { color: var(--text); transform: scale(1.08); }
.ctrl-icon.active { color: var(--accent); }
.ctrl-icon.active:hover { color: var(--accent); filter: brightness(1.2); }

/* Shuffle indicator dot */
.ctrl-icon.active::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px;
  background: var(--accent);
  border-radius: 50%;
}
.ctrl-icon { position: relative; }

.pb-play {
  width: 38px; height: 38px;
  background: var(--text);
  border-radius: 50%;
  display: flex; align-items:center; justify-content:center;
  color: #000;
  transition: transform 0.1s, background 0.2s;
  flex-shrink: 0;
}
.pb-play:hover { transform: scale(1.06); background: #e0e0e0; }
.pb-play:active { transform: scale(0.94); }

/* Progress */
.pb-progress-row {
  display: flex; align-items:center; gap:8px;
  width: 100%; max-width: 500px;
}
.pb-time { font-size: 11px; color: var(--text-3); width: 34px; text-align:center; flex-shrink:0; }
.prog-bar {
  flex: 1; height: 4px;
  background: var(--bg4);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  transition: height 0.1s;
}
.prog-bar:hover { height: 6px; }
.prog-filled {
  height: 100%; background: var(--accent);
  border-radius: 2px; width: 0%;
  position: relative;
  transition: width 0.25s linear;
}
.prog-filled::after {
  content:'';
  position:absolute; right:-5px; top:50%; transform:translateY(-50%);
  width:12px; height:12px;
  background:#fff; border-radius:50%;
  opacity:0; transition:opacity 0.12s;
  box-shadow:0 0 6px rgba(0,0,0,0.4);
}
.prog-bar:hover .prog-filled::after { opacity:1; }

/* Right: volume */
.pb-right {
  display: flex; align-items:center; justify-content:flex-end; gap:8px;
}
.vol-wrap { display:flex; align-items:center; gap:6px; }
.vol-icon { color: var(--text-2); flex-shrink:0; }

input[type=range].vol-range {
  -webkit-appearance:none;
  width: 80px; height: 4px;
  background: var(--bg4);
  border-radius: 2px; cursor:pointer; outline:none;
  transition: height 0.1s;
}
input[type=range].vol-range:hover { height: 6px; }
input[type=range].vol-range::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:12px; height:12px;
  background:var(--text); border-radius:50%; cursor:pointer;
}
input[type=range].vol-range:hover::-webkit-slider-thumb { background:var(--accent); }

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.modal-bg {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(12px);
  z-index:200;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity 0.2s;
}
.modal-bg.open { opacity:1; pointer-events:all; }
.modal-card {
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:16px;
  padding:28px;
  width:460px; max-width:92vw;
  box-shadow:0 32px 80px rgba(0,0,0,0.6);
  transform:translateY(16px) scale(0.98);
  transition:transform 0.2s;
}
.modal-bg.open .modal-card { transform:translateY(0) scale(1); }
.modal-card h2 { font-size:18px; font-weight:800; margin-bottom:5px; }
.modal-card p  { font-size:12px; color:var(--text-2); margin-bottom:20px; line-height:1.65; }
.fg { margin-bottom:13px; }
.fg label { display:block; font-size:10px; letter-spacing:1.5px; color:var(--text-3); text-transform:uppercase; margin-bottom:5px; }
.fg input {
  width:100%; background:var(--bg4); border:1px solid var(--border);
  border-radius:8px; padding:10px 13px; color:var(--text);
  font-family:var(--font); font-size:13px; outline:none;
  transition:border-color 0.15s;
}
.fg input:focus { border-color:var(--accent); }
.fg input::placeholder { color:var(--text-3); }
.fg .hint { font-size:11px; color:var(--text-3); margin-top:5px; line-height:1.55; }
.modal-actions { display:flex; gap:9px; margin-top:20px; }
.btn-confirm {
  flex:1; background:var(--accent); color:#000;
  border-radius:25px; padding:11px;
  font-weight:700; font-size:13px;
  transition:background 0.15s;
}
.btn-confirm:hover { background:#1ed760; }
.btn-cancel {
  background:transparent; color:var(--text-2);
  border:1px solid var(--border); border-radius:25px; padding:11px 18px;
  font-size:13px; font-weight:600;
  transition:all 0.15s;
}
.btn-cancel:hover { border-color:var(--text); color:var(--text); }

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.toast {
  position:fixed; bottom:108px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--bg4); border:1px solid var(--border);
  border-radius:8px; padding:9px 18px;
  font-size:12px; font-weight:500;
  z-index:300; opacity:0;
  transition:all 0.22s; pointer-events:none; white-space:nowrap;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════
   MOBILE LAYOUT  (≤ 768px)
═══════════════════════════════════════════ */
@media (max-width: 768px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr auto;
  }

  /* On mobile: SHOW sidebar as main content, HIDE now-playing main */
  .sidebar {
    display: flex;
    grid-row: 1/2;
    grid-column: 1;
    border-right: none;
    background: var(--bg);
  }

  .main-content { display: none; }

  /* Mobile player bar */
  .player-bar {
    grid-column: 1/-1;
    grid-row: 2/3;
    grid-template-columns: 1fr;
    padding: 10px 16px calc(14px + env(safe-area-inset-bottom));
    gap: 8px;
    height: auto;
  }

  /* Hide desktop-only sections in player bar */
  .pb-track { display: none; }
  .pb-right  { display: none; }
  .pb-center { width: 100%; gap: 8px; }
  .pb-progress-row { max-width: 100%; }

  /* Mobile now-playing strip — shown inside player bar */
  .mobile-now-playing {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 2px 0 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .mobile-thumb {
    width: 42px; height: 42px;
    border-radius: 6px;
    background: var(--bg4);
    flex-shrink: 0;
    display: flex; align-items:center; justify-content:center;
    font-size: 18px;
    overflow: hidden;
  }
  .mobile-info { flex:1; min-width:0; }
  .mobile-title {
    font-size: 14px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mobile-artist { font-size: 12px; color: var(--text-2); margin-top: 1px; }

  /* Bigger controls on mobile */
  .pb-ctrl-row { gap: 10px; }
  .ctrl-icon { width: 38px; height: 38px; }
  .pb-play { width: 44px; height: 44px; }

  /* Mobile sidebar adjustments */
  .sidebar-inner { padding: 0 6px; }
  .logo-wrap { padding: 14px 12px 10px; }
  .playlist-scroll { flex: 1; }
  .track-row { padding: 8px 10px; }
  .tr-thumb { width: 42px; height: 42px; font-size: 18px; }
  .tr-title { font-size: 14px; }
  .tr-artist { font-size: 12px; }

  .toast { bottom: 220px; }
}

/* Mobile now-playing — hidden on desktop */
.mobile-now-playing { display: none; }

/* ═══════════════════════════════════════════
   GRAIN OVERLAY
═══════════════════════════════════════════ */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9999; opacity:0.25;
}

/* Scrollbar global */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
</style>
</head>
<body>

<div class="app">

  <!-- ══════════ SIDEBAR ══════════ -->
  <aside class="sidebar">
    <div class="sidebar-inner">

      <div class="logo-wrap">
        <svg class="logo-svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        <span class="logo-text">WAVR</span>

      <div class="library-header">
        <div class="library-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h2v18H3V3zm4 0h2v18H7V3zm4 4h10v2H11V7zm0 4h10v2H11v-2zm0 4h10v2H11v-2z"/></svg>
          Your Library
        </div>
        <span class="track-count-badge" id="track-count">—</span>

      <div class="status-row">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Connecting to Drive...</span>

      <div class="playlist-scroll" id="playlist"></div>

      <button class="add-track-btn" onclick="openModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add from Google Drive
      </button>

  </aside>

  <!-- ══════════ MAIN ══════════ -->
  <main class="main-content">
    <div class="main-bg" id="main-bg"></div>

    <div class="main-topbar">
      <span class="main-topbar-title">Now Playing</span>
      <button class="refresh-btn" onclick="loadFromDrive()" title="Refresh library">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      </button>
    </div>

    <div class="now-playing-zone">
      <div class="art-container" id="art-container">
        <div class="art-shadow-ring" id="art-shadow"></div>
        <div class="art-box" id="art-box">
          🎵
          <div class="art-center-hole"></div>
        </div>

      <div class="nw-info">
        <div class="nw-title" id="nw-title">Loading...</div>
        <div class="nw-artist" id="nw-artist">—</div>

      <div class="viz-wrap" id="viz"></div>
    </div>
  </main>

  <!-- ══════════ PLAYER BAR ══════════ -->
  <div class="player-bar">

    <!-- Left: track info (desktop) -->
    <div class="pb-track">
      <div class="pb-thumb" id="pb-thumb">🎵</div>
      <div class="pb-info">
        <div class="pb-title"  id="pb-title">No track</div>
        <div class="pb-artist" id="pb-artist">—</div>
      </div>
    </div>

    <!-- Center: controls -->
    <div class="pb-center">

      <!-- Mobile now playing row -->
      <div class="mobile-now-playing">
        <div class="mobile-thumb" id="m-thumb">🎵</div>
        <div class="mobile-info">
          <div class="mobile-title"  id="m-title">No track selected</div>
          <div class="mobile-artist" id="m-artist">—</div>
        </div>
      </div>

      <!-- Control buttons -->
      <div class="pb-ctrl-row">
        <!-- Shuffle -->
        <button class="ctrl-icon" id="btn-shuffle" onclick="cycleShuffle()" title="Shuffle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </button>

        <!-- Prev -->
        <button class="ctrl-icon" onclick="prevTrack()" title="Previous">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>

        <!-- Play/Pause -->
        <button class="pb-play" id="pb-play" onclick="togglePlay()">
          <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <!-- Next -->
        <button class="ctrl-icon" onclick="nextTrack()" title="Next">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/></svg>
        </button>

        <!-- Repeat (OFF / ALL / ONE) -->
        <button class="ctrl-icon" id="btn-repeat" onclick="cycleRepeat()" title="Repeat">
          <svg id="repeat-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
        </button>
      </div>

      <!-- Progress bar -->
      <div class="pb-progress-row">
        <span class="pb-time" id="t-cur">0:00</span>
        <div class="prog-bar" id="prog-bar" onclick="seekTo(event)">
          <div class="prog-filled" id="prog-filled"></div>
        </div>
        <span class="pb-time" id="t-tot">0:00</span>
      </div>

    <!-- Right: volume (desktop) -->
    <div class="pb-right">
      <div class="vol-wrap">
        <svg class="vol-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
        <input type="range" class="vol-range" id="vol" min="0" max="100" value="80" oninput="setVol(this.value)">
      </div>

  </div>

<!-- ══════════ ADD TRACK MODAL ══════════ -->
<div class="modal-bg" id="modal" onclick="closeModalOut(event)">
  <div class="modal-card">
    <h2>Add Track</h2>
    <p>Paste a Google Drive shareable link. Set file sharing to <strong>"Anyone with the link → Viewer"</strong>.</p>
    <div class="fg">
      <label>Track Title *</label>
      <input type="text" id="i-title" placeholder="e.g. Tumi Je Amar">
    </div>
    <div class="fg">
      <label>Artist</label>
      <input type="text" id="i-artist" placeholder="e.g. Arijit Singh">
    </div>
    <div class="fg">
      <label>Google Drive Link or File ID *</label>
      <input type="text" id="i-link" placeholder="https://drive.google.com/file/d/XXXXX/view">
      <p class="hint">✅ Full Drive link &nbsp;✅ Raw File ID</p>
    </div>
    <div class="fg">
      <label>Emoji (optional)</label>
      <input type="text" id="i-emoji" placeholder="🎸 🎹 🎤">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="addTrack()">Add to Library</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<audio id="audio" preload="none"></audio>

<script>
// ══════════════════════════════════════════
//  🔑 CONFIG
// ══════════════════════════════════════════
const API_KEY   = "AIzaSyDutn48HU6P7Ichd9ckaTnJV2anbjuoudY";
const FOLDER_ID = "1jGcpCRrHgOv2jwu97uY-ZF39bq19hkAk";
// ══════════════════════════════════════════

// State
let tracks  = [];
let cur     = -1;
let playing = false;
// repeat: 0=OFF, 1=REPEAT ALL, 2=REPEAT ONE
let repeat  = 0;
let shuffle = false;
let raf;

const audio = document.getElementById('audio');

// ── Visualizer ──
const vizEl = document.getElementById('viz');
const VN = 42;
const vbs = [];
for (let i = 0; i < VN; i++) {
  const b = document.createElement('div');
  b.className = 'vb';
  vizEl.appendChild(b);
  vbs.push(b);
}
function animViz() {
  if (!playing) { vbs.forEach(b => b.style.height = '3px'); return; }
  const t = Date.now() / 1000;
  vbs.forEach((b, i) => {
    const h = 4
      + Math.abs(Math.sin(t * 2.2 + i * 0.4))  * 18
      + Math.abs(Math.sin(t * 4.1 + i * 0.72)) * 12
      + Math.abs(Math.sin(t * 1.3 + i * 0.18)) * 6;
    b.style.height = h + 'px';
  });
  raf = requestAnimationFrame(animViz);
}

// ── Status ──
function setStatus(s, msg) {
  document.getElementById('status-dot').className = 'status-dot ' + s;
  document.getElementById('status-text').textContent = msg;
}

// ── Load from Drive ──
async function loadFromDrive() {
  setStatus('loading', 'Loading library...');
  document.getElementById('track-count').textContent = '…';

  const MIME = ['audio/mpeg','audio/mp3','audio/wav','audio/ogg','audio/flac','audio/aac','audio/x-m4a','audio/mp4'];
  const mq   = MIME.map(m => `mimeType='${m}'`).join(' or ');
  const q    = encodeURIComponent(`'${FOLDER_ID}' in parents and (${mq}) and trashed=false`);
  const fl   = encodeURIComponent('files(id,name,mimeType)');
  const url  = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=${fl}&orderBy=name&pageSize=1000&key=${API_KEY}`;

  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) {
      setStatus('err', data.error.message || 'API Error');
      toast('❌ ' + (data.error.message || 'API Error'));
      renderEmpty('API Error', data.error.message);
      return;
    }
    const files = data.files || [];
    if (!files.length) {
      setStatus('err', 'No audio found');
      toast('⚠️ Folder-এ audio নেই');
      renderEmpty('Empty Folder', 'No audio files in your Drive folder');
      return;
    }
    const driveTracks = files.map(f => ({
      fileId: f.id,
      title:  cleanName(f.name),
      artist: guessArtist(f.name),
      emoji:  mimeEmoji(f.mimeType),
    }));
    const manual = JSON.parse(localStorage.getItem('wavr_manual') || '[]');
    tracks = [...driveTracks, ...manual];

    setStatus('ok', `${tracks.length} songs loaded`);
    document.getElementById('track-count').textContent = tracks.length;
    renderList();
    toast(`✅ ${files.length} songs loaded!`);
    if (cur === -1) play(0);

  } catch(e) {
    setStatus('err', 'Network error');
    toast('❌ Network error');
    renderEmpty('Network Error', 'Check API Key and folder sharing');
  }
}

function renderEmpty(title, msg) {
  document.getElementById('playlist').innerHTML = `
    <div class="empty-wrap">
      <div class="e-icon">⚠️</div>
      <h4>${title}</h4>
      <p>${msg}</p>
    </div>`;
  document.getElementById('track-count').textContent = '0';
}

// ── Name helpers ──
function cleanName(n) {
  n = n.replace(/\.(mp3|wav|ogg|flac|aac|m4a|opus|mp4)$/i,'').replace(/_/g,' ').trim();
  return n.includes(' - ') ? n.split(' - ').slice(1).join(' - ').trim() : n;
}
function guessArtist(n) {
  n = n.replace(/\.(mp3|wav|ogg|flac|aac|m4a|opus|mp4)$/i,'');
  return n.includes(' - ') ? n.split(' - ')[0].trim() : '';
}
function mimeEmoji(m) {
  if (m.includes('flac')) return '💿';
  if (m.includes('wav'))  return '🎼';
  if (m.includes('ogg'))  return '🎶';
  if (m.includes('aac') || m.includes('m4a')) return '🎧';
  return '🎵';
}

// ── Render Playlist ──
const COLORS = ['#1db954','#1da0f2','#e91e8c','#ff6d00','#8b5cf6','#00bcd4','#f59e0b','#ef4444'];

function renderList() {
  const pl = document.getElementById('playlist');
  pl.innerHTML = '';
  if (!tracks.length) {
    pl.innerHTML = `<div class="empty-wrap"><div class="e-icon">🎵</div><h4>No tracks</h4><p>Add from Google Drive</p></div>`;
    return;
  }
  tracks.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'track-row' + (i===cur?' active':'') + (i===cur&&!playing?' paused-state':'');
    div.innerHTML = `
      <div class="tr-num-wrap">
        <span class="tr-num">${i+1}</span>
        <span class="play-hover">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </span>
        <div class="mini-bars">
          <div class="mb"></div><div class="mb"></div><div class="mb"></div><div class="mb"></div>
        </div>
      </div>
      <div class="tr-thumb">${t.emoji||'🎵'}</div>
      <div class="tr-info">
        <div class="tr-title">${t.title}</div>
        <div class="tr-artist">${t.artist||'Unknown'}</div>
      </div>
      <button class="tr-del" onclick="delTrack(${i},event)" title="Remove">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`;
    div.querySelector('.tr-info').addEventListener('click', ()=>play(i));
    div.querySelector('.tr-thumb').addEventListener('click', ()=>play(i));
    div.querySelector('.tr-num-wrap').addEventListener('click', ()=>play(i));
    pl.appendChild(div);
  });
  // Scroll active into view
  const active = pl.querySelector('.track-row.active');
  if (active) active.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

// ── Playback ──
function play(i) {
  if (i < 0 || i >= tracks.length) return;
  cur = i;
  const t = tracks[i];
  // Use Drive API alt=media for direct streaming (avoids CORS redirect issues)
  audio.src = `https://www.googleapis.com/drive/v3/files/${t.fileId}?alt=media&key=${API_KEY}`;
  audio.volume = document.getElementById('vol').value / 100;
  audio.play()
    .then(()=>{ playing=true; updateUI(); cancelAnimationFrame(raf); animViz(); })
    .catch(()=> toast('❌ Cannot load. Check Drive permissions.'));
}

function updateUI() {
  const t = tracks[cur];
  if (!t) return;
  const c = COLORS[cur % COLORS.length];

  // Titles
  [
    ['nw-title',  t.title],
    ['nw-artist', t.artist||'Unknown Artist'],
    ['pb-title',  t.title],
    ['pb-artist', t.artist||'Unknown Artist'],
    ['m-title',   t.title],
    ['m-artist',  t.artist||'Unknown Artist'],
  ].forEach(([id,val])=>{ document.getElementById(id).textContent=val; });

  // Thumbs
  const emoji = t.emoji || '🎵';
  document.getElementById('pb-thumb').textContent = emoji;
  document.getElementById('m-thumb').textContent  = emoji;
  // Art box emoji (before hole div)
  const ab = document.getElementById('art-box');
  ab.childNodes[0].textContent = emoji;

  // Play icon
  document.getElementById('play-icon').innerHTML = playing
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';

  // BG gradient
  document.getElementById('main-bg').style.background =
    `radial-gradient(ellipse at 50% 0%, ${c}28 0%, transparent 65%)`;

  // Glow
  document.getElementById('art-shadow').style.background =
    `radial-gradient(circle, ${c} 0%, transparent 70%)`;
  document.getElementById('art-container').className = playing ? 'art-container lit' : 'art-container';

  // Art spin
  if (playing) { ab.classList.add('spinning'); ab.classList.remove('halted'); }
  else         { ab.classList.add('halted'); }

  // Viz color
  vbs.forEach(b => b.style.background = c);

  renderList();
}

function togglePlay() {
  if (cur===-1 && tracks.length) { play(0); return; }
  if (!tracks.length) return;
  if (audio.paused) {
    audio.play(); playing=true;
    document.getElementById('art-box').classList.remove('halted');
    cancelAnimationFrame(raf); animViz();
  } else {
    audio.pause(); playing=false;
    document.getElementById('art-box').classList.add('halted');
    vbs.forEach(b=>b.style.height='3px');
  }
  document.getElementById('play-icon').innerHTML = playing
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
  document.getElementById('art-container').className = playing ? 'art-container lit' : 'art-container';
  renderList();
}

function nextTrack() {
  if (!tracks.length) return;
  if (shuffle) {
    play(Math.floor(Math.random()*tracks.length));
  } else {
    play((cur+1) % tracks.length);
  }
}

function prevTrack() {
  if (!tracks.length) return;
  if (audio.currentTime > 3) { audio.currentTime=0; return; }
  play((cur - 1 + tracks.length) % tracks.length);
}

// ── Repeat modes ──
// 0 = off, 1 = repeat all, 2 = repeat one
function cycleRepeat() {
  repeat = (repeat + 1) % 3;
  const btn = document.getElementById('btn-repeat');
  const icon = document.getElementById('repeat-icon');

  if (repeat === 0) {
    // OFF
    btn.classList.remove('active');
    icon.innerHTML = `<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/>`;
    toast('🔁 Repeat OFF');
  } else if (repeat === 1) {
    // REPEAT ALL
    btn.classList.add('active');
    icon.innerHTML = `<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/>`;
    toast('🔁 Repeat All');
  } else {
    // REPEAT ONE
    btn.classList.add('active');
    // repeat-1 icon: add "1" text
    icon.innerHTML = `<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/><text x="9" y="14" font-size="6" fill="currentColor" stroke="none" font-weight="bold" font-family="sans-serif">1</text>`;
    toast('🔂 Repeat One');
  }
}

// ── Shuffle ──
function cycleShuffle() {
  shuffle = !shuffle;
  document.getElementById('btn-shuffle').classList.toggle('active', shuffle);
  toast(shuffle ? '🔀 Shuffle ON' : '🔀 Shuffle OFF');
}

// ── Audio events ──
audio.addEventListener('timeupdate', () => {
  const d = audio.duration||0, c = audio.currentTime;
  document.getElementById('t-cur').textContent = fmt(c);
  document.getElementById('t-tot').textContent = fmt(d);
  document.getElementById('prog-filled').style.width = (d ? c/d*100 : 0) + '%';
});

audio.addEventListener('ended', () => {
  if (repeat === 2) {
    // Repeat one
    audio.currentTime = 0; audio.play();
  } else if (repeat === 1) {
    // Repeat all
    nextTrack();
  } else {
    // No repeat — stop at end unless there's a next track
    if (cur < tracks.length - 1) nextTrack();
    else { playing=false; updateUI(); }
  }
});

audio.addEventListener('error', () => {
  toast('⚠️ Audio error. Ensure file is publicly shared on Drive.');
  playing=false; updateUI();
});

function seekTo(e) {
  if (!audio.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX-r.left)/r.width) * audio.duration;
}

function setVol(v) { audio.volume = v/100; }
function fmt(s) {
  if (!s||isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}

// ── Manual add ──
function parseId(s) {
  s=s.trim();
  const ps=[/\/file\/d\/([a-zA-Z0-9_-]{20,})/,/id=([a-zA-Z0-9_-]{20,})/,/\/d\/([a-zA-Z0-9_-]{20,})/];
  for(const p of ps){const m=s.match(p);if(m)return m[1];}
  if(/^[a-zA-Z0-9_-]{20,}$/.test(s))return s;
  return null;
}

function openModal()  { document.getElementById('modal').classList.add('open'); setTimeout(()=>document.getElementById('i-title').focus(),120); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  ['i-title','i-artist','i-link','i-emoji'].forEach(id=>document.getElementById(id).value='');
}
function closeModalOut(e) { if(e.target===document.getElementById('modal')) closeModal(); }

function addTrack() {
  const title  = document.getElementById('i-title').value.trim();
  const artist = document.getElementById('i-artist').value.trim();
  const link   = document.getElementById('i-link').value.trim();
  const emoji  = document.getElementById('i-emoji').value.trim();
  if (!title) { toast('⚠️ Title দাও'); return; }
  if (!link)  { toast('⚠️ Drive link দাও'); return; }
  const fid = parseId(link);
  if (!fid) { toast('❌ Invalid Drive link'); return; }
  const nt = { title, artist, fileId:fid, emoji:emoji||'🎵' };
  tracks.push(nt);
  const m = JSON.parse(localStorage.getItem('wavr_manual')||'[]');
  m.push(nt); localStorage.setItem('wavr_manual',JSON.stringify(m));
  document.getElementById('track-count').textContent = tracks.length;
  renderList(); closeModal();
  toast(`✅ "${title}" added!`);
  if (tracks.length===1) play(0);
}

function delTrack(i,e) {
  e.stopPropagation();
  const wasActive = i===cur;
  tracks.splice(i,1);
  if (cur>=tracks.length) cur=tracks.length-1;
  document.getElementById('track-count').textContent = tracks.length;
  renderList();
  if (wasActive && tracks.length) play(cur);
  else if (!tracks.length) { audio.pause(); playing=false; }
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2700);
}

// ── Keyboard ──
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space')      { e.preventDefault(); togglePlay(); }
  if(e.code==='ArrowRight') audio.currentTime=Math.min(audio.currentTime+10,audio.duration||0);
  if(e.code==='ArrowLeft')  audio.currentTime=Math.max(audio.currentTime-10,0);
  if(e.code==='KeyN')       nextTrack();
  if(e.code==='KeyP')       prevTrack();
  if(e.code==='KeyS')       cycleShuffle();
  if(e.code==='KeyR')       cycleRepeat();
  if(e.code==='ArrowUp')  { const v=document.getElementById('vol'); v.value=Math.min(+v.value+10,100); setVol(v.value); }
  if(e.code==='ArrowDown'){ const v=document.getElementById('vol'); v.value=Math.max(+v.value-10,0);  setVol(v.value); }
});

// ── Init ──
loadFromDrive();
</script>
